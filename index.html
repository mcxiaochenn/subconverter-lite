<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subconverter Lite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a1f2e;
            --bg-input: #0d1117;
            --border: #1e293b;
            --border-focus: #3b82f6;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
        }

        .header-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 14px;
            color: white;
        }

        .logo-text {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: -0.5px;
        }

        .logo-tag {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-primary);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
        }

        .main {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 24px;
        }

        .container {
            width: 100%;
            max-width: 640px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-header-icon {
            width: 36px;
            height: 36px;
            background: var(--accent-glow);
            border: 1px solid var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 18px;
        }

        .card-header-text h2 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .card-header-text p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .card-body {
            padding: 24px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
        }

        input[type="url"] {
            flex: 1;
            padding: 10px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="url"]::placeholder {
            color: var(--text-muted);
        }

        input[type="url"]:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid transparent;
            padding: 6px 10px;
            font-size: 12px;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--danger);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-block {
            width: 100%;
        }

        .url-list {
            margin-top: 16px;
        }

        .url-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }

        .url-item .url-index {
            color: var(--text-muted);
            font-weight: 500;
            min-width: 20px;
        }

        .url-item .url-text {
            flex: 1;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .url-item .btn-danger {
            opacity: 0;
            transition: opacity 0.2s;
        }

        .url-item:hover .btn-danger {
            opacity: 1;
        }

        .generate-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .result-section {
            margin-top: 20px;
            padding: 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: none;
        }

        .result-section.active {
            display: block;
        }

        .result-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .result-url {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--accent);
            word-break: break-all;
            line-height: 1.6;
            margin-bottom: 16px;
            padding: 12px;
            background: var(--bg-primary);
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .result-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .footer {
            padding: 20px 0;
            border-top: 1px solid var(--border);
            background: var(--bg-secondary);
        }

        .footer-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
        }

        .footer a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: var(--accent);
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 13px;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .empty-state {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: 13px;
        }

        @media (max-width: 640px) {
            .header-content {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }

            .result-actions {
                flex-direction: column;
            }

            .btn-block-mobile {
                width: 100%;
            }

            .footer-content {
                flex-direction: column;
                gap: 8px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">S</div>
                <div class="logo-text">subconverter-lite</div>
                <div class="logo-tag">v1.0</div>
            </div>
            <div class="status-bar">
                <div class="status-item">
                    <div class="status-dot"></div>
                    <span>在线</span>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="card">
                <div class="card-header">
                    <div class="card-header-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                        </svg>
                    </div>
                    <div class="card-header-text">
                        <h2>订阅转换</h2>
                        <p>输入 Clash 订阅链接，生成配置</p>
                    </div>
                </div>

                <div class="card-body">
                    <div class="input-group">
                        <label class="input-label">订阅链接</label>
                        <div class="input-wrapper">
                            <input type="url" id="subUrl" placeholder="https://example.com/subscribe?token=...">
                            <button class="btn btn-secondary" onclick="addUrl()">添加</button>
                        </div>
                    </div>

                    <div class="url-list" id="urlList"></div>

                    <div class="generate-section">
                        <button class="btn btn-primary btn-block btn-block-mobile" onclick="generateConfig()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            生成配置
                        </button>

                        <div class="result-section" id="resultSection">
                            <div class="result-label">订阅地址</div>
                            <div class="result-url" id="resultUrl"></div>
                            <div class="result-actions">
                                <button class="btn btn-primary btn-sm" onclick="copyUrl()">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                    </svg>
                                    复制链接
                                </button>
                                <button class="btn btn-secondary btn-sm" onclick="downloadConfig()">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                        <polyline points="7 10 12 15 17 10"></polyline>
                                        <line x1="12" y1="15" x2="12" y2="3"></line>
                                    </svg>
                                    下载配置
                                </button>
                                <button class="btn btn-secondary btn-sm" onclick="openInClash()">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                                        <polyline points="15 3 21 3 21 9"></polyline>
                                        <line x1="10" y1="14" x2="21" y2="3"></line>
                                    </svg>
                                    在 Clash 中打开
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <span>subconverter-lite</span>
            <span>基于 PHP · 轻量化订阅转换</span>
            <a href="https://github.com/mcxiaochenn/subconverter-lite" target="_blank">GitHub</a>
        </div>
        <div class="footer-content" style="margin-top: 8px; font-size: 11px;">
            <span>模板来源：<a href="https://github.com/luestr/ProxyResource/blob/main/Tool/Clash/Config/Clash_Sample_Config_By_iKeLee.yaml" target="_blank">可莉配置</a> · 作者：<a href="https://t.me/iKeLee" target="_blank">iKeLee</a></span>
        </div>
    </footer>

    <div class="toast" id="toast"></div>

    <script>
        let urls = [];
        const MAX_URLS = 5;

        function addUrl() {
            const input = document.getElementById('subUrl');
            const url = input.value.trim();

            if (!url) {
                showToast('请输入订阅链接');
                return;
            }

            if (!isValidUrl(url)) {
                showToast('请输入有效的 URL');
                return;
            }

            if (urls.length >= MAX_URLS) {
                showToast(`最多支持 ${MAX_URLS} 个订阅链接`);
                return;
            }

            if (urls.includes(url)) {
                showToast('该链接已存在');
                return;
            }

            urls.push(url);
            input.value = '';
            renderUrlList();
            showToast('添加成功');
        }

        function removeUrl(index) {
            urls.splice(index, 1);
            renderUrlList();
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function renderUrlList() {
            const list = document.getElementById('urlList');
            
            if (urls.length === 0) {
                list.innerHTML = '';
                return;
            }

            list.innerHTML = urls.map((url, index) => `
                <div class="url-item">
                    <span class="url-index">${String(index + 1).padStart(2, '0')}</span>
                    <span class="url-text">${escapeHtml(url)}</span>
                    <button class="btn btn-danger btn-sm" onclick="removeUrl(${index})">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
            `).join('');
        }

        function generateConfig() {
            if (urls.length === 0) {
                showToast('请先添加订阅链接');
                return;
            }

            const baseUrl = window.location.origin + window.location.pathname.replace('index.html', '');
            const params = urls.map((url, index) => `sub_url_${index + 1}=${encodeURIComponent(url)}`).join('&');
            const configUrl = `${baseUrl}api.php?${params}`;

            document.getElementById('resultUrl').textContent = configUrl;
            document.getElementById('resultSection').classList.add('active');
            showToast('配置链接已生成');
        }

        function copyUrl() {
            const url = document.getElementById('resultUrl').textContent;
            navigator.clipboard.writeText(url).then(() => {
                showToast('已复制到剪贴板');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = url;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('已复制到剪贴板');
            });
        }

        function downloadConfig() {
            const url = document.getElementById('resultUrl').textContent;
            window.open(url, '_blank');
        }

        function openInClash() {
            const url = document.getElementById('resultUrl').textContent;
            const clashUrl = `clash://install-config?url=${encodeURIComponent(url)}`;
            window.open(clashUrl, '_blank');
        }

        function isValidUrl(string) {
            try {
                new URL(string);
                return true;
            } catch (_) {
                return false;
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        document.getElementById('subUrl').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addUrl();
            }
        });
    </script>
</body>
</html>
